<script type="text/markdown" id="markdown-content">

# <span class="root-title">🎓 La evaluación<br>educativa</span><br/><audio controls src="./img/0.mp3" style="height: 30px; width: 220px; margin-top: 10px;"></audio>

## 1️⃣ ¿Qué es y su relación con enseñanza-aprendizaje?<br/><audio controls src="./img/1.mp3" style="height: 30px; width: 200px; margin-top: 8px;"></audio>

### Proceso dinámico
- 🖼️ <img src="./img/1.png" width="350" height="287"><br/><small><i>Dimensión contextual y dinámica.</i></small>

### Concepto
- **Castillo & Cabrerizo:** Proceso **dinámico, abierto y contextualizado**.
- **Tenbrink:** Tres operaciones articuladas:
  - 1. Obtener información rigurosa
  - 2. Formular juicios de valor
  - 3. Tomar decisiones

### Relación Enseñanza-Aprendizaje
- **Álvarez Méndez:** Parte constitutiva del aprendizaje, no separada.
- **Celman:** Herramienta de conocimiento para comprender y mejorar.
- **Castillo & Cabrerizo:** Punto de encuentro didáctico.
- **Litwin:** Atribuir valor en situaciones concretas.

### Idea central
- ❌ **No es un apéndice**.
- ✅ Es parte **constitutiva e indisociable**.
- Permite: regular el proceso, orientar decisiones y dialogar pedagógicamente.

## 2️⃣ ¿Para qué y por qué evaluar?<br/><audio controls src="./img/2.mp3" style="height: 30px; width: 200px; margin-top: 8px;"></audio>

### Por qué (Funciones)
- 🧭 **Diagnóstica:** Conocer el punto de partida del alumno.
- ⚙️ **Formativa/Reguladora:** Acompañar y ajustar durante el proceso.
- 🏁 **Sumativa:** Valorar los resultados al cierre.

### Para qué (Finalidades)
- Tomar decisiones pedagógicas.
- Adecuar la enseñanza a necesidades y ritmos.
- Promover aprendizajes a partir del error.
- Calificar, facilitar la promoción y acreditar saberes.
- **Transformar la evaluación en herramienta de conocimiento.**

## 3️⃣ Toma de decisión y Constructivismo<br/><audio controls src="./img/3.mp3" style="height: 30px; width: 200px; margin-top: 8px;"></audio>

### Fundamentos
- 🖼️ <img src="./img/3.png" width="350" height="321"><br/><small><i>Integración constructivista.</i></small>

### Postulado Constructivista
- **Allal:** Comprender el funcionamiento cognitivo frente a la tarea.
- **Díaz Barriga:** Coherencia total entre enseñar, aprender y evaluar.

### 💡 El Error Formativo
- **Allal:** No son fracasos, sino indicadores de estrategias y obstáculos.
- Permiten observar cómo piensa el alumno y qué ayuda necesita.

### Evaluación Dinámica
- Interacción profesor-alumno observando avances con ayuda.
- **Vigotsky:** Actuar sobre la Zona de Desarrollo Próximo (ZDP).

### Decisión Pedagógica
- El docente interviene durante el proceso brindando pistas y andamiajes.
- Favorece la modificabilidad, autonomía y disponibilidad para aprender.

## 4️⃣ Enfoque de la materia<br/><audio controls src="./img/4.mp3" style="height: 30px; width: 200px; margin-top: 8px;"></audio>

### 🌍 Evaluación Auténtica
- Tareas complejas, activas y cercanas a la vida real.
- Valorar desempeños en contextos significativos (Díaz Barriga).

### 🧩 Por Competencias
- 🖼️ <img src="./img/2.png" width="350" height="164"><br/><small><i>Saberes integrados.</i></small>
- Desempeño integral:
  - 🧠 **Saber:** Conceptos e información.
  - 🛠️ **Saber hacer:** Habilidades y procedimientos.
  - ❤️ **Saber ser:** Actitudes y valores.
  - 🔄 **Saber aprender:** Metacognición y autonomía.

### 🌱 Evaluación Formadora
- **Jorba & Sanmartí:** El alumno aprende a regular su propio proceso.
- Favorece la autoevaluación, metacognición y mejora autónoma.

## 5️⃣ Preguntas clásicas<br/><audio controls src="./img/5.mp3" style="height: 30px; width: 200px; margin-top: 8px;"></audio>

### 🎯 ¿Qué evaluar?
- Competencias básicas, conocimientos, habilidades, actitudes, procesos y resultados.

### 🛠️ ¿Cómo evaluar?
- Metodologías variadas, cuantitativas y cualitativas.
- Fomentar la creatividad y la reflexión sobre el proceso.

### ⏱️ ¿Cuándo evaluar?
- **Antes:** Inicial / Diagnóstica.
- **Durante:** Procesual / Formativa / Reguladora.
- **Final:** Final / Sumativa.

### 📋 ¿Con qué? (Instrumentos)
- Rúbricas o matrices de valoración (Ahumada).
- Portafolios de evidencias (Airasian, McKeachie).
- Listas de cotejo, producciones escritas, proyectos y trabajo colaborativo.

### 👥 ¿Quién evalúa?
- **Heteroevaluación:** Docente a alumno.
- **Autoevaluación:** El propio alumno analiza su aprendizaje.
- **Coevaluación:** Los pares valoran procesos o producciones.

## 6️⃣ Idea integradora<br/><audio controls src="./img/6.mp3" style="height: 30px; width: 200px; margin-top: 8px;"></audio>

### Síntesis
- Evaluar para **comprender, decidir y mejorar**.
- No se reduce a medir ni a calificar.
- *"Acompañar el aprendizaje como quien enciende una linterna, no como quien cuenta los pasos al final."*

## 7️⃣ Mirada personal<br/><audio controls src="./img/7.mp3" style="height: 30px; width: 200px; margin-top: 8px;"></audio>

### 🔍 El corpus delicti evaluativo
- 🖼️ <img src="./img/corpus%20delicti.jpg" width="300" height="153"><br/><small><i>Mi primera evaluación (tal como apareció en <a href="https://padlet.com/mpaz85/nos-presentamos-nvle6d91na42b3dc/wish/kxodWG26Nz0bZgP7" target="_blank" style="color: #2980b9; text-decoration: underline;">mi presentación</a> para esa materia)</i></small>

### Reflexión final
- 🔨 **No es un martillo:** que cae sobre el error.
- 🔦 **Es una linterna:** que permite ver mejor el camino.
- Si solo da nota: califica sin enseñar.
- Con retroalimentación: ayuda a comprender qué pasó, qué se necesita y cómo seguir.

  <script>
    let mm;
    let originalRoot; // stored as a plain JS object (JSON-safe copy of the parsed tree)

    // Apply fold states recursively on a deep clone - never mutates the original
    function deepCloneWithFold(node, foldLevel, currentLevel = 0) {
      return {
        content: node.content,
        depth:   node.depth,
        payload: Object.assign({}, node.payload, { fold: currentLevel >= foldLevel ? 1 : 0 }),
        children: Array.isArray(node.children)
          ? node.children.map(c => deepCloneWithFold(c, foldLevel, currentLevel + 1))
          : []
      };
    }

    document.addEventListener("DOMContentLoaded", () => {
      const markdown = document.getElementById('markdown-content').textContent;
      const { Markmap, Transformer, deriveOptions } = window.markmap;

      const transformer = new Transformer();
      const { root } = transformer.transform(markdown);

      // Store a safe JSON copy of the original tree (before any fold mutations)
      originalRoot = JSON.parse(JSON.stringify(root));

      // deriveOptions converts color arrays → color functions, numbers, booleans, etc.
      const frontmatter = root.payload?.markmap || {};
      const derived = deriveOptions(frontmatter);

      const svg = document.getElementById('markmap');
      mm = Markmap.create(svg, {
        autoFit: true,
        fitRatio: 0.92,
        paddingX: 50,
        duration: 400,
        initialExpandLevel: 2,  // start at level 2
        ...derived               // applies color fn, maxWidth, etc. from frontmatter
      }, root);
    });

    window.expandAll = function() {
      if (!mm || !originalRoot) return;
      try {
        // initialExpandLevel -1 means "never fold" in initializeData
        mm.setOptions({ initialExpandLevel: -1 });
        mm.setData(JSON.parse(JSON.stringify(originalRoot)));
        setTimeout(() => mm.fit(), 60);
      } catch(e) { console.error('expandAll error:', e); }
    };

    window.collapseAll = function() {
      if (!mm || !originalRoot) return;
      try {
        // Restore fold at level 2
        mm.setOptions({ initialExpandLevel: 2 });
        mm.setData(JSON.parse(JSON.stringify(originalRoot)));
        setTimeout(() => mm.fit(), 60);
      } catch(e) { console.error('collapseAll error:', e); }
    };

    window.saveAsPNG = function() {
      const btn = document.getElementById('btnSave');
      const originalText = btn.innerHTML;
      btn.innerHTML = '⏳ Generando...';
      
      const uiElements = document.querySelectorAll('.glass-panel');
      uiElements.forEach(el => el.style.display = 'none');

      // Expandimos todo para que el PNG salga completo
      mm.setOptions({ initialExpandLevel: -1 });
      mm.setData(JSON.parse(JSON.stringify(originalRoot)));

      setTimeout(() => {
        const svgEl = document.getElementById('markmap');
        const g = svgEl.querySelector('g');
        
        // Obtenemos el tamaño real del mapa desplegado al 100%
        const bbox = g.getBBox();
        const padding = 100;
        const realWidth = Math.ceil(bbox.width + padding * 2);
        const realHeight = Math.ceil(bbox.height + padding * 2);

        // Guardamos los estilos originales
        const oldW = svgEl.style.width || '';
        const oldH = svgEl.style.height || '';

        // Forzamos al SVG a tener el tamaño exacto del mapa para que renderice 1:1
        svgEl.style.width = realWidth + 'px';
        svgEl.style.height = realHeight + 'px';

        mm.fit().then(() => {
          setTimeout(() => {
            // Quitamos temporalmente los audios del DOM
            const audios = document.querySelectorAll('audio');
            const audioPlaceholders = [];
            audios.forEach(a => {
              const placeholder = document.createComment('audio-placeholder');
              a.parentNode.insertBefore(placeholder, a);
              a.remove();
              audioPlaceholders.push({ placeholder, audio: a });
            });

            // Solo capturamos el SVG, ignorando el resto de la interfaz y la pantalla
            htmlToImage.toPng(svgEl, { 
              bgcolor: '#ffffff',
              width: realWidth,
              height: realHeight,
              pixelRatio: 2, // Resolución excelente a escala real
              style: {
                margin: '0',
                padding: '0'
              },
              filter: (node) => {
                if (node.tagName === 'IMG' && node.id && node.id.includes('community_highlight')) return false;
                if (node.src && typeof node.src === 'string' && node.src.startsWith('chrome-extension://')) return false;
                return true;
              }
            })
            .then(function (dataUrl) {
              const link = document.createElement('a');
              link.download = 'Mapa_Evaluacion_Educativa.png';
              link.href = dataUrl;
              link.click();

              // Restaurar SVG, audios y UI
              svgEl.style.width = oldW;
              svgEl.style.height = oldH;
              audioPlaceholders.forEach(item => {
                item.placeholder.parentNode.replaceChild(item.audio, item.placeholder);
              });
              uiElements.forEach(el => el.style.display = '');
              
              btn.innerHTML = originalText;
              mm.setOptions({ initialExpandLevel: 2 });
              mm.setData(JSON.parse(JSON.stringify(originalRoot)));
              setTimeout(() => mm.fit(), 60);
            })
            .catch(function (error) {
              console.error('Error capturando el mapa:', error);
              // Restaurar si falla
              svgEl.style.width = oldW;
              svgEl.style.height = oldH;
              audioPlaceholders.forEach(item => {
                if(item.placeholder.parentNode) {
                  item.placeholder.parentNode.replaceChild(item.audio, item.placeholder);
                }
              });
              uiElements.forEach(el => el.style.display = '');
              
              btn.innerHTML = '❌ Error';
              setTimeout(() => btn.innerHTML = originalText, 2000);
            });
          }, 400); // Dar un poco más de tiempo para asentar el fit()
        });
      }, 600);
    };
  </script>
